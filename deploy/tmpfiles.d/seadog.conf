# seadog tmpfiles — create seadog's runtime + persistent state dirs.
#
# /run is tmpfs, so /run/seadog vanishes across reboots; systemd-tmpfiles
# recreates it here. It holds the watcher flock (/run/seadog/watcher.lock,
# $SEADOG_WATCHER_LOCK).
#
# /var/lib/seadog is the PERSISTENT state dir (the SQLite DB + its WAL/SHM
# sidecars + backups). The packages (.deb/.rpm) ship no file there, and
# systemd-sysusers does not create the testenv home dir, so tmpfiles owns
# its creation: run from the package post-install (after sysusers makes the
# group) AND re-asserted every boot. 2775 = setgid group `seadog` so both
# root (sweeper/helper) and the testenv front-end can write the shared DB.
# This replaces install.sh's `install -d -m 2775 -o root -g seadog`.
#
# Perms 0775 root:seadog. The ROOT watcher (`seadog-priv watch`, run via
# sudo) creates + flocks the lockfile, so root must be able to write the
# dir. The unprivileged testenv front-end may pre-check the same lock to
# skip a pointless watcher spawn, so it needs read+traverse — granted via
# group `seadog` (testenv is a member) plus world-read. setgid (the
# leading 2 would be added if a child needed group inheritance) is not
# required here since only the single lockfile lives in this dir.
#
# Type  Path             Mode  UID   GID     Age  Argument
d       /run/seadog      0775  root  seadog  -    -
d       /var/lib/seadog  2775  root  seadog  -    -
