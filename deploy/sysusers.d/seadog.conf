# seadog sysusers.d — declarative system group + user creation.
#
# Replaces install.sh's imperative groupadd/useradd. Consumed by
# `systemd-sysusers` on both Debian and Fedora (run from the package
# maintainer scripts / scriptlets on install).
#
# Group `seadog` is the shared group: /var/lib/seadog is setgid-`seadog`
# so both root (sweeper/helper) and the testenv front-end can write the
# DB + its WAL/SHM sidecars.
#
# User `testenv` is the unprivileged SSH login identity. Its PRIMARY group
# is `seadog` (the `-:seadog` field = auto-allocate UID, primary GID
# seadog), home is /var/lib/seadog, and its login shell is the seadog
# front-end binary (the git-shell pattern) — that path is added to
# /etc/shells by the maintainer scripts. No real interactive login.
#
# Type Name     ID         GECOS                            Home            Shell
g      seadog   -
u      testenv  -:seadog   "seadog test-env provisioner"    /var/lib/seadog /usr/lib/seadog/seadog
