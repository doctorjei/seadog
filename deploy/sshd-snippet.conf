# seadog sshd drop-in — install to /etc/ssh/sshd_config.d/seadog.conf.
#
# Locks down the `testenv` account that callers SSH into to run one verb
# per connection. The login shell for testenv is /usr/lib/seadog/seadog
# (set by install.sh, listed in /etc/shells); sshd hands it the caller's
# command via -c / $SSH_ORIGINAL_COMMAND.
#
# Owner identity is injected per-key, NOT globally: each authorized_keys
# line carries a forced `command="/usr/lib/seadog/seadog --owner <name>"`,
# so the trusted owner comes from WHICH key authenticated — never from the
# caller's command text. That is why there is no global ForceCommand here:
# a single ForceCommand could not carry a per-key owner. The forced
# command in authorized_keys is the identity boundary; this block just
# strips every other capability off the session.
#
# authorized_keys is ROOT-owned at /etc/seadog/authorized_keys (mode 0644),
# NOT in testenv's home — testenv must not be able to rewrite its own owner
# mapping. Exact line format (one per authorized key):
#
#   command="/usr/lib/seadog/seadog --owner alice",restrict ssh-ed25519 AAAA...blob... alice@host
#
# (`restrict` already implies no-pty/no-*-forwarding; the Match options
# below are belt-and-suspenders at the daemon level.)

Match User testenv
    AuthorizedKeysFile /etc/seadog/authorized_keys
    X11Forwarding no
    AllowTcpForwarding no
    AllowAgentForwarding no
    PermitTunnel no
    PermitTTY no
